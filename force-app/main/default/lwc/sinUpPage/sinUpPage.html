<template>
    <div class="modal-container">
        <!-- Close Button -->
        <button class="close-btn" onclick={closeModal} aria-label="Close">
            <lightning-icon icon-name="utility:close" size="x-small"></lightning-icon>
        </button>

        <div class="form-wrapper">
            <!-- Header -->
            <div class="header-section">
                <h1 class="main-title">Create <span class="text-red">Account</span></h1>
                <p class="subtitle">Sign up and start your journey with us</p>
            </div>

            <!-- Registration Form -->
            <form class="registration-form" onsubmit={preventDefault}>
                <!-- Full Name -->
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <div class="input-wrapper">
                        <lightning-icon icon-name="utility:user" size="x-small" class="input-icon"></lightning-icon>
                        <input 
                            type="text" 
                            class="input-field" 
                            placeholder="John Doe" 
                            value={formData.fullName}
                            onchange={handleInputChange}
                            data-field="fullName"
                            required
                        />
                        <lightning-icon 
                            icon-name="utility:success" 
                            size="x-small" 
                            class="success-icon"
                            if:true={validation.fullNameValid}
                        ></lightning-icon>
                    </div>
                    <span class="error-text" if:true={validation.fullNameError}>{validation.fullNameError}</span>
                </div>

                <!-- Mobile Number -->
                <div class="form-group">
                    <label class="form-label">Mobile Number</label>
                    <div class="input-wrapper">
                        <lightning-icon icon-name="utility:call" size="x-small" class="input-icon"></lightning-icon>
                        <input 
                            type="tel" 
                            class="input-field" 
                            placeholder="+91 9876543210" 
                            value={formData.mobileNumber}
                            onchange={handleInputChange}
                            data-field="mobileNumber"
                            required
                        />
                        <lightning-icon 
                            icon-name="utility:success" 
                            size="x-small" 
                            class="success-icon"
                            if:true={validation.mobileValid}
                        ></lightning-icon>
                    </div>
                    <span class="error-text" if:true={validation.mobileError}>{validation.mobileError}</span>
                </div>

                <!-- Email Address -->
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <lightning-icon icon-name="utility:email" size="x-small" class="input-icon"></lightning-icon>
                        <input 
                            type="email" 
                            class="input-field" 
                            placeholder="john.doe@gmail.com" 
                            value={formData.email}
                            onchange={handleInputChange}
                            data-field="email"
                            required
                        />
                        <lightning-icon 
                            icon-name="utility:success" 
                            size="x-small" 
                            class="success-icon"
                            if:true={validation.emailValid}
                        ></lightning-icon>
                    </div>
                    <span class="error-text" if:true={validation.emailError}>{validation.emailError}</span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <lightning-icon icon-name="utility:lock" size="x-small" class="input-icon"></lightning-icon>
                        <input 
                            type={passwordFieldType} 
                            class="input-field" 
                            placeholder="••••••••••••" 
                            value={formData.password}
                            onchange={handlePasswordChange}
                            data-field="password"
                            required
                        />
                        <button type="button" class="toggle-password" onclick={togglePasswordVisibility}>
                            <lightning-icon 
                                icon-name={passwordToggleIcon} 
                                size="x-small"
                            ></lightning-icon>
                        </button>
                        <lightning-icon 
                            icon-name="utility:success" 
                            size="x-small" 
                            class="success-icon"
                            if:true={validation.passwordValid}
                        ></lightning-icon>
                    </div>
                    <!-- Password Strength Indicator -->
                    <div class="password-strength" if:true={formData.password}>
                        <div class="strength-bar">
                            <div class="strength-fill" style={passwordStrengthStyle}></div>
                        </div>
                        <span class="strength-text">{passwordStrengthText}</span>
                    </div>
                    <span class="error-text" if:true={validation.passwordError}>{validation.passwordError}</span>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-wrapper">
                        <lightning-icon icon-name="utility:lock" size="x-small" class="input-icon"></lightning-icon>
                        <input 
                            type={confirmPasswordFieldType} 
                            class="input-field" 
                            placeholder="••••••••••••" 
                            value={formData.confirmPassword}
                            onchange={handleInputChange}
                            data-field="confirmPassword"
                            required
                        />
                        <button type="button" class="toggle-password" onclick={toggleConfirmPasswordVisibility}>
                            <lightning-icon 
                                icon-name={confirmPasswordToggleIcon} 
                                size="x-small"
                            ></lightning-icon>
                        </button>
                        <lightning-icon 
                            icon-name="utility:success" 
                            size="x-small" 
                            class="success-icon"
                            if:true={validation.confirmPasswordValid}
                        ></lightning-icon>
                    </div>
                    <span class="error-text" if:true={validation.confirmPasswordError}>{validation.confirmPasswordError}</span>
                </div>

                <!-- Terms and Conditions -->
                <div class="checkbox-group">
                    <input 
                        type="checkbox" 
                        id="terms-checkbox" 
                        class="checkbox-input"
                        checked={formData.acceptTerms}
                        onchange={handleTermsChange}
                    />
                    <label for="terms-checkbox" class="checkbox-label">
                        I agree with <a href="#" class="link-text" onclick={handleTermsClick}>Terms and Conditions</a>
                    </label>
                </div>

                <!-- Sign Up Button -->
                <button 
                    type="button" 
                    class="signup-button" 
                    onclick={handleSignUp}
                    disabled={isLoading}
                >
                    <span if:false={isLoading}>create Account</span>
                    <span if:true={isLoading}>
                        <lightning-spinner alternative-text="Loading" size="x-small" variant="brand"></lightning-spinner>
                    </span>
                </button>

                <!-- OR Divider -->
                <div class="divider">
                    <span>OR</span>
                </div>

                <!-- Social Login Buttons -->
                <div class="social-buttons">
                    <button type="button" class="social-btn google-btn" onclick={handleGoogleLogin}>
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        <span>Continue with Google</span>
                    </button>
                    
                    <button type="button" class="social-btn facebook-btn" onclick={handleFacebookLogin}>
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="#1877F2">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        <span>Continue with Facebook</span>
                    </button>
                </div>

                <!-- Login Link -->
                <div class="footer-text">
                    Already have an account? <a href="#" class="link-text" onclick={handleLoginClick}>Login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Success Modal -->
    <template if:true={showSuccessModal}>
        <div class="modal-overlay" onclick={closeSuccessModal}>
            <div class="success-modal" onclick={stopPropagation}>
                <div class="success-icon-container">
                    <lightning-icon icon-name="utility:success" size="xx-large" class="success-checkmark"></lightning-icon>
                </div>
                <h2 class="success-title">Registration Successful!</h2>
                <p class="success-message">A verification email has been sent to {formData.email}. Please verify your email to activate your account.</p>
                <button class="success-button" onclick={closeSuccessModal}>Continue</button>
            </div>
        </div>
    </template>
</template>
