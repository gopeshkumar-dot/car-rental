<template>
    <div class="slds-card">
        <div class="slds-m-around_medium container">
            <div class="search-section">
                <lightning-input 
                    type="search" 
                    label="Search" 
                    value={searchTerm}
                    onchange={handleSearchTermChange}
                    class="search-bar">
                </lightning-input>
            </div>
            <div class="car-image-section"></div>
        </div>
        <template if:true={cars.length}>
            <div class="slds-m-around_medium car-list-container">
                <template for:each={cars} for:item="car">
                    <div key={car.Id} data-id={car.Id} class="car-item" onclick={handleCarClick}>
                        <p><strong>{car.Name}</strong></p>
                        <p>Type: {car.Type__c}</p>
                        <p>Color: {car.Color__c}</p>
                        <p>Status: {car.Status__c}</p>
                    </div>
                </template>
            </div>
        </template>
        <template if:false={cars.length}>
            <p class="slds-errormessage">No results found</p>
        </template>
    </div>

    <!-- Modal for Car Details -->
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                <lightning-icon icon-name="utility:close" alternative-text="close" size="small" class="iconcolour"></lightning-icon>
                <span class="slds-assistive-text">Close</span>
            </button>
            <div class="slds-modal__content slds-p-around_medium">
                <div class="slds-grid slds-wrap">
                    <template for:each={urls} for:item="url">
                        <div key={url} class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                            <img src={url} alt="Car Photo" class="car-photo"/>
                        </div>
                    </template>
                    <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                        <p><strong>Car Name:</strong> {car.Name}</p>
                        <p><strong>Type:</strong> {car.Type__c}</p>
                        <p><strong>Color:</strong> {car.Color__c}</p>
                        <p><strong>Seat:</strong> {car.Seat__c}</p>
                        <p><strong>Status:</strong> {car.Status__c}</p>
                        <p><strong>Rating:</strong> {car.Rating__c}</p>
                        <p><strong>Model:</strong> {car.Model__c}</p>
                        <p><strong>Description:</strong> {car.Description__c}</p>
                    </div>
                </div>
            </div>
            <footer class="slds-modal__footer">
                <lightning-button variant="neutral" label="Close" onclick={closeModal}></lightning-button>
                <lightning-button variant="brand" label="Book" onclick={handleBook}></lightning-button>
            </footer>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

     <template if:true={handleorder}>
         <section role="dialog" tabindex="-1" class="slds-Booking slds-fade-in-open">
            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                <lightning-icon icon-name="utility:close" alternative-text="close" size="small" class="iconcolour"></lightning-icon>
                <span class="slds-assistive-text">Close</span>
            </button>
        <c-booking_page></c-booking_page>
             <footer class="slds-modal__footer">
                <lightning-button variant="neutral" label="Close" onclick={closeModal}></lightning-button>
            </footer>
         </section>
    </template>

</template>
