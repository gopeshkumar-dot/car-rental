<template>
    <!-- Header Section -->
    <header class="header-container">
        <div class="header-wrapper">
            <!-- Logo Section -->
            <div class="logo-section">
                <img src={logoUrl} alt="Safar Car Rental" class="logo" onerror={handleLogoError} />
            </div>

            <!-- Contact Information - Desktop -->
            <div class="contact-section desktop-only">
                <div class="contact-item" role="button" tabindex="0" aria-label="Email support" onclick={handleEmailClick} onkeydown={handleKeyDown}>
                    <div class="icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <div class="contact-info">
                        <div class="contact-label">FOR SUPPORT MAIL US :</div>
                        <div class="contact-value">{supportEmail}</div>
                    </div>
                </div>

                <div class="contact-item" role="button" tabindex="0" aria-label="Call helpline" onclick={handleCallClick} onkeydown={handleKeyDown}>
                    <div class="icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                    </div>
                    <div class="contact-info">
                        <div class="contact-label">SERVICE HELPLINE CALL US:</div>
                        <div class="contact-value">{helplineNumber}</div>
                    </div>
                </div>

                <div class="contact-item" role="button" tabindex="0" aria-label="Chat on WhatsApp" onclick={handleWhatsAppClick} onkeydown={handleKeyDown}>
                    <div class="icon-wrapper whatsapp-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                        </svg>
                    </div>
                    <div class="contact-info">
                        <div class="contact-label">WHATSAPP US:</div>
                        <div class="contact-value">{whatsappNumber}</div>
                    </div>
                </div>
            </div>

            <!-- Login/Register Button -->
            <div class="action-section">
                <button class="login-btn" onclick={openLoginModal} aria-label="Login">
                    {loginButtonText}
                </button>
            </div>
        </div>

        <!-- Mobile Contact Section -->
        <div class="mobile-contact-section mobile-only">
            <div class="mobile-contact-item" onclick={handleEmailClick}>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <span>Mail Us</span>
            </div>
            <div class="mobile-contact-item" onclick={handleCallClick}>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                <span>Call Us</span>
            </div>
            <div class="mobile-contact-item" onclick={handleWhatsAppClick}>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                </svg>
                <span>WhatsApp</span>
            </div>
        </div>
    </header>

    <!-- Login Modal -->
    <template if:true={showLoginModal}>
        <div class="modal-overlay" onclick={handleOverlayClick}>
            <div class="modal-container" onclick={stopPropagation}>
                <!-- Header -->
                <div class="modal-header">
                    <h2 class="modal-title">Login</h2>
                    <button class="close-button" onclick={closeAllModals} aria-label="Close modal">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <!-- Form -->
                <form class="login-form" onsubmit={handleLogin}>
                    <!-- Email Field -->
                    <div class="form-group">
                        <input 
                            type="email" 
                            class="form-input" 
                            placeholder="Email address*" 
                            value={email}
                            onchange={handleEmailChange}
                            required
                        />
                        <div class="error-message" if:true={emailError}>{emailError}</div>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <input 
                            type="password" 
                            class="form-input" 
                            placeholder="Password*" 
                            value={password}
                            onchange={handlePasswordChange}
                            required
                        />
                        <div class="error-message" if:true={passwordError}>{passwordError}</div>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="login-button" disabled={isLoading}>
                        <span if:false={isLoading}>Login</span>
                        <span if:true={isLoading} class="loading-text">
                            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Logging in...
                        </span>
                    </button>
                </form>

                <!-- Footer Links -->
                <div class="modal-footer">
                    <p class="signup-text">
                        Don't have an account? 
                        <a href="#" class="signup-link" onclick={openSignupModal}>Signup Here</a>
                    </p>
                    <a href="#" class="forgot-link" onclick={openForgotPasswordModal}>Forgot Password?</a>
                </div>
            </div>
        </div>
    </template>

    <!-- Sign Up Modal -->
    <template if:true={showSignupModal}>
        <div class="modal-overlay" onclick={handleOverlayClick}>
            <div class="modal-container" onclick={stopPropagation}>
                <!-- Header -->
                <div class="modal-header">
                    <h2 class="modal-title">Create Account</h2>
                    <button class="close-button" onclick={closeAllModals} aria-label="Close modal">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <!-- Form -->
                <form class="login-form" onsubmit={handleSignup}>
                    <!-- Full Name Field -->
                    <div class="form-group">
                        <input 
                            type="text" 
                            class="form-input" 
                            placeholder="Full Name" 
                            value={fullName}
                            onchange={handleFullNameChange}
                            required
                        />
                        <div class="error-message" if:true={fullNameError}>{fullNameError}</div>
                    </div>

                    <!-- Mobile Number Field -->
                    <div class="form-group">
                        <input 
                            type="tel" 
                            class="form-input" 
                            placeholder="Mobile Number" 
                            value={mobileNumber}
                            onchange={handleMobileNumberChange}
                            required
                        />
                        <div class="error-message" if:true={mobileNumberError}>{mobileNumberError}</div>
                    </div>

                    <!-- Email Address Field -->
                    <div class="form-group">
                        <input 
                            type="email" 
                            class="form-input" 
                            placeholder="Email Address" 
                            value={signupEmail}
                            onchange={handleSignupEmailChange}
                            required
                        />
                        <div class="error-message" if:true={signupEmailError}>{signupEmailError}</div>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <input 
                            type="password" 
                            class="form-input" 
                            placeholder="Password" 
                            value={signupPassword}
                            onchange={handleSignupPasswordChange}
                            required
                        />
                        <div class="error-message" if:true={signupPasswordError}>{signupPasswordError}</div>
                    </div>

                    <!-- Terms and Conditions -->
                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input 
                                type="checkbox" 
                                checked={agreeToTerms}
                                onchange={handleTermsChange}
                            />
                            <span class="checkbox-text">
                                I Agree with <a href="#" class="terms-link" onclick={handleTermsClick}>Terms and Conditions</a>
                            </span>
                        </label>
                        <div class="error-message" if:true={termsError}>{termsError}</div>
                    </div>

                    <!-- Sign Up Button -->
                    <button type="submit" class="login-button" disabled={isLoading}>
                        <span if:false={isLoading}>Sign Up</span>
                        <span if:true={isLoading} class="loading-text">
                            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Creating Account...
                        </span>
                    </button>
                </form>

            <div>
                <div class="social-buttons">
                <button type="button" class="social-btn google-btn" onclick={handleGoogleLogin}>
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span>Continue with Google</span>
                </button>
                </div>

                <div>
                <button type="button" class="social-btn facebook-btn" onclick={handleFacebookLogin}>
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="#1877F2">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    <span>Continue with Facebook</span>
                </button>
                </div>
            </div>

                <!-- Footer Links -->
                <div class="modal-footer">
                    <p class="signup-text">
                        Already got an account? 
                        <a href="#" class="signup-link" onclick={openLoginModalFromSignup}>Login Here</a>
                    </p>
                </div>  
                
            </div>
            
        </div>
    </template>

    <!-- Password Recovery Modal -->
    <template if:true={showForgotPasswordModal}>
        <div class="modal-overlay" onclick={handleOverlayClick}>
            <div class="modal-container" onclick={stopPropagation}>
                <!-- Header -->
                <div class="modal-header">
                    <h2 class="modal-title">Password Recovery</h2>
                    <button class="close-button" onclick={closeAllModals} aria-label="Close modal">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <!-- STEP 1: Enter Email -->
                <template if:true={isRecoveryStep1}>
                    <form class="login-form" onsubmit={handleRequestResetSubmit}>
                        <div class="form-group">
                            <p style="color: #4b5563; font-size: 14px; margin-bottom: 12px; line-height: 1.5;">
                                Enter your registered email address and we'll send you a 6-digit code to reset your password.
                            </p>
                            <input 
                                type="email" 
                                class="form-input" 
                                placeholder="Your Email address*" 
                                value={recoveryEmail}
                                onchange={handleRecoveryEmailChange}
                                required
                            />
                            <div class="error-message" if:true={recoveryEmailError}>{recoveryEmailError}</div>
                        </div>

                        <!-- Reset Password Button -->
                        <button type="submit" class="login-button" disabled={isLoading}>
                            <span if:false={isLoading}>Send Reset Code</span>
                            <span if:true={isLoading} class="loading-text">
                                <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" style="animation: spin 1s linear infinite; width: 18px; height: 18px; margin-right: 8px;">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" style="opacity: 0.25;"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" style="opacity: 0.75;"></path>
                                </svg>
                                Sending...
                            </span>
                        </button>
                    </form>
                </template>

                <!-- STEP 2: Verify Code -->
                <template if:true={isRecoveryStep2}>
                    <form class="login-form" onsubmit={handleVerifyResetCodeSubmit}>
                        <div class="form-group">
                            <p style="color: #4b5563; font-size: 14px; margin-bottom: 12px; line-height: 1.5;">
                                We have sent a password reset code to <strong>{recoveryEmail}</strong>. Please check your inbox and enter it below.
                            </p>
                            <input 
                                type="text" 
                                class="form-input" 
                                placeholder="Enter 6-Digit OTP Code*" 
                                maxlength="6"
                                style="text-align: center; font-size: 18px; font-weight: bold; letter-spacing: 4px;"
                                value={recoveryCode}
                                onchange={handleRecoveryCodeChange}
                                required
                            />
                            <div class="error-message" if:true={recoveryCodeError}>{recoveryCodeError}</div>
                        </div>

                        <!-- Verify Button -->
                        <button type="submit" class="login-button" disabled={isLoading}>
                            <span if:false={isLoading}>Verify Code</span>
                            <span if:true={isLoading} class="loading-text">
                                <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" style="animation: spin 1s linear infinite; width: 18px; height: 18px; margin-right: 8px;">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" style="opacity: 0.25;"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" style="opacity: 0.75;"></path>
                                </svg>
                                Verifying...
                            </span>
                        </button>
                    </form>
                </template>

                <!-- STEP 3: Enter New Password -->
                <template if:true={isRecoveryStep3}>
                    <form class="login-form" onsubmit={handleUpdatePasswordSubmit}>
                        <div class="form-group">
                            <p style="color: #4b5563; font-size: 14px; margin-bottom: 12px; line-height: 1.5;">
                                Enter your new password below to complete the recovery.
                            </p>
                            <input 
                                type="password" 
                                class="form-input" 
                                placeholder="New Password*" 
                                value={newPassword}
                                onchange={handleNewPasswordChange}
                                required
                            />
                            <div class="error-message" if:true={newPasswordError}>{newPasswordError}</div>
                        </div>

                        <div class="form-group">
                            <input 
                                type="password" 
                                class="form-input" 
                                placeholder="Confirm New Password*" 
                                value={confirmPassword}
                                onchange={handleConfirmPasswordChange}
                                required
                            />
                            <div class="error-message" if:true={confirmPasswordError}>{confirmPasswordError}</div>
                        </div>

                        <!-- Update Button -->
                        <button type="submit" class="login-button" disabled={isLoading}>
                            <span if:false={isLoading}>Update Password</span>
                            <span if:true={isLoading} class="loading-text">
                                <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" style="animation: spin 1s linear infinite; width: 18px; height: 18px; margin-right: 8px;">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" style="opacity: 0.25;"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" style="opacity: 0.75;"></path>
                                </svg>
                                Updating...
                            </span>
                        </button>
                    </form>
                </template>

                <!-- Security Note -->
                <div class="security-note" style="margin-top: 16px; font-size: 12px; color: #6b7280; text-align: center;">
                    For security reasons we don't store your password. Your password will be updated securely.
                </div>

                <!-- Back to Login Link -->
                <div class="modal-footer">
                    <a href="#" class="back-to-login" onclick={openLoginModalFromRecovery}>« Back to Login</a>
                </div>
            </div>
        </div>
    </template>


    <!-- Email Verification Modal -->
<!-- Email Verification Modal -->
<template if:true={showVerificationModal}>
    <div class="modal-overlay" onclick={handleOverlayClick}>
        <div class="modal-container" onclick={stopPropagation}>
            <!-- Header -->
            <div class="modal-header">
                <h2 class="modal-title">Verify Your Email</h2>
                <button class="close-button" onclick={closeAllModals} aria-label="Close modal">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <!-- Verification Content -->
            <div class="verification-content">
                <!-- Success Message -->
                <div class="verification-message" if:true={verificationCodeSent}>
                    <div class="success-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                    </div>
                    <p class="message-text">
                        We've sent a 6-digit verification code to<br/>
                        <strong>{signupEmail}</strong>
                    </p>
                    <p class="message-subtext">Check your inbox & spam folder</p>
                </div>

                <!-- ✅ FIXED: OTP Input Section -->
                <div class="form-group">
                    <label class="form-label">Enter Verification Code</label>
                    <div class="otp-input-container" style="display: flex; gap: 8px; justify-content: center; margin: 16px 0;">
                        <template for:each={otpDigits} for:item="digit">
                            <input 
                                key={digit.index}
                                type="text" 
                                class="otp-input"
                                maxlength="1"
                                value={digit.value}
                                data-index={digit.index}
                                onchange={handleOtpChange}
                                onkeyup={handleOtpKeyup}
                                onpaste={handleOtpPaste}
                            />
                        </template>
                    </div>
                    <div class="error-message" style="color: #dc2626; font-size: 12px; margin-top: 4px;" if:true={otpError}>{otpError}</div>
                </div>

                <!-- Resend Code Section -->
                <div class="resend-section" style="text-align: center; margin: 12px 0;">
                    <span class="resend-text" style="color: #6b7280;">Didn't receive code?</span>
                    <button 
                        type="button" 
                        class="resend-link" 
                        style="background: none; border: none; color: #2563eb; cursor: pointer; font-weight: 500; margin-left: 4px;"
                        onclick={handleResendCode}
                        disabled={resendDisabled}
                    >
                        {resendButtonText}
                    </button>
                </div>

                <!-- Action Buttons -->
                <div class="verification-actions" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
                    <button 
                        type="button" 
                        class="verify-button" 
                        onclick={handleVerifyCode}
                        disabled={isVerifyButtonDisabled}
                        style="background-color: {isVerifyButtonDisabled ? '#9ca3af' : '#22c55e'}; color: white; border: none; padding: 14px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: {isVerifyButtonDisabled ? 'not-allowed' : 'pointer'}; transition: all 0.2s;"
                    >
                        <span if:false={isLoading}>Verify & Continue</span>
                        <span if:true={isLoading} class="loading-text">
                            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" style="display: inline-block; vertical-align: middle; margin-right: 8px;">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Verifying...
                        </span>
                    </button>
                    <button 
                        type="button" 
                        class="change-email-link" 
                        onclick={handleChangeEmail}
                        style="background: none; border: none; color: #6b7280; cursor: pointer; text-decoration: underline;"
                    >
                        Change Email Address
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>
</template>
